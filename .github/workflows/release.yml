name: release

# Publishes @arpsw/astro-cms to the public npm registry when a v* tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
# Requires an NPM_TOKEN repo secret (npm automation token with publish rights).
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@arpsw'

      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
