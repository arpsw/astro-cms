name: release

# Publishes @arpsw/astro-cms to GitHub Packages when a v* tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@arpsw'

      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          # GITHUB_TOKEN has packages:write for this repo's org packages.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
